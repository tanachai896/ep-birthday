<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 EP Birthday Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Prompt:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --deep: #0d001f;
  --purple: #7B2FBE;
  --pink: #FF6B9D;
  --cyan: #00E5FF;
  --green: #00FF88;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  font-family: 'Mitr', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(123,47,190,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(0,45,100,0.4) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255,107,157,0.1) 0%, transparent 50%);
  z-index: 0; pointer-events: none;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  text-align: center;
}

/* ── MUTE BUTTON ── */
.mute-btn {
  position: absolute;
  top: 15px;
  right: 20px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: rgba(255, 255, 255, 0.6);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Mitr', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mute-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}

/* ── HEADER ── */
h1 {
  font-family: 'Prompt', sans-serif;
  font-weight: 900;
  font-size: clamp(2rem, 7vw, 3.8rem);
  background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 50%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.15;
  filter: drop-shadow(0 0 30px rgba(255,215,0,0.25));
}
.subtitle {
  color: rgba(255,255,255,0.45);
  font-size: .9rem;
  margin-top: 6px;
  letter-spacing: .5px;
}

/* ── DATE CHIP & PICKER ── */
.date-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 40px;
  padding: 8px 20px;
  font-size: .85rem;
  color: rgba(255,255,255,0.6);
  margin: 18px auto 36px;
}
.custom-date-picker {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: var(--cyan);
  font-family: 'Prompt', sans-serif;
  font-size: 0.85rem;
  border-radius: 20px;
  padding: 3px 12px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.custom-date-picker:focus {
  border-color: var(--pink);
  background: rgba(255, 255, 255, 0.15);
}
.custom-date-picker::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

/* ── MYSTERY BOX ── */
.mystery-zone {
  margin-bottom: 36px;
}
.mystery-label {
  font-size: .8rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* The big question mark card */
.big-card {
  position: relative;
  width: 100%;
  max-width: 440px;
  margin: 0 auto 28px;
  height: 220px;
  border-radius: 28px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  transition: border-color .4s, box-shadow .4s, transform 0.3s ease;
}
.big-card.idle {
  border-color: rgba(255,255,255,0.1);
}
.big-card.spinning {
  border-color: var(--pink);
  box-shadow: 0 0 40px rgba(255,107,157,0.2);
  transform: scale(0.98);
}
.big-card.revealed {
  border-color: var(--gold);
  box-shadow: 0 0 60px rgba(255,215,0,0.25), 0 0 120px rgba(255,215,0,0.08);
  animation: cardPulse 2s ease infinite alternate;
}
.big-card.no-more {
  border-color: var(--cyan);
  box-shadow: 0 0 40px rgba(0,229,255,0.15);
}
@keyframes cardPulse {
  from { box-shadow: 0 0 40px rgba(255,215,0,0.2); transform: scale(1); }
  to   { box-shadow: 0 0 80px rgba(255,215,0,0.45); transform: scale(1.02); }
}

/* Shimmer overlay during spin */
.big-card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  background-size: 200% 100%;
  opacity: 0;
  transition: opacity .3s;
}
.big-card.spinning::after {
  opacity: 1;
  animation: shimmer 1.2s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.qmark {
  font-size: 5rem;
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(255,107,157,0.5));
  animation: floatQ 3s ease-in-out infinite;
}
@keyframes floatQ {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.qmark-sub {
  color: rgba(255,255,255,0.3);
  font-size: .85rem;
  margin-top: 10px;
}

/* Spin display text */
.spin-text {
  font-family: 'Prompt', sans-serif;
  font-size: clamp(1rem, 3vw, 1.3rem);
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  padding: 0 20px;
  text-align: center;
}

/* Revealed person */
.reveal-emoji {
  font-size: 3rem;
  animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
  margin-bottom: 10px;
}
.reveal-name {
  font-family: 'Prompt', sans-serif;
  font-weight: 700;
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: var(--gold);
  animation: slideUp .35s ease;
  padding: 0 16px;
}
.reveal-meta {
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
  animation: slideUp .45s ease;
}
@keyframes popIn {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* No more state */
.no-more-text {
  font-family: 'Prompt', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--cyan);
  animation: slideUp .4s ease;
}
.no-more-sub {
  color: rgba(255,255,255,0.4);
  font-size: .85rem;
  margin-top: 8px;
  animation: slideUp .5s ease;
  padding: 0 20px;
}

/* Badges */
.badge {
  font-size: .72rem;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.badge.teacher { background: rgba(0,229,255,0.15); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }
.badge.student { background: rgba(255,215,0,0.12); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
.badge.room { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }

/* ── BUTTON ── */
.btn-spin {
  background: linear-gradient(135deg, #FF6B9D, #a83468, #7B2FBE);
  border: none;
  color: #fff;
  font-family: 'Prompt', sans-serif;
  font-weight: 700;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  padding: 16px 52px;
  border-radius: 60px;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform .25s, box-shadow .25s;
  box-shadow: 0 8px 36px rgba(255,107,157,0.4);
  letter-spacing: .5px;
}
.btn-spin::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
  border-radius: inherit;
}
.btn-spin:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 50px rgba(255,107,157,0.55); }
.btn-spin:active { transform: scale(.97); }
.btn-spin:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-reset {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.55);
  font-family: 'Mitr', sans-serif;
  font-size: .85rem;
  padding: 10px 28px;
  border-radius: 40px;
  cursor: pointer;
  margin-top: 14px;
  transition: all .2s;
  display: none;
}
.btn-reset:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
.btn-reset.show { display: inline-block; }

/* ── REVEALED LIST ── */
.revealed-section {
  margin-top: 40px;
  text-align: left;
}
.section-title {
  font-size: .78rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
  text-align: center;
}
.revealed-list {
  display: flex; flex-direction: column; gap: 10px;
}
.revealed-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  animation: slideIn .4s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.item-num {
  font-family: 'Prompt', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  color: rgba(255,215,0,0.25);
  min-width: 32px;
  text-align: center;
}
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-weight: 600;
  font-size: .92rem;
  color: rgba(255,255,255,0.9);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }

/* ── SUMMARY ── */
.summary-box {
  margin-top: 36px;
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,107,157,0.05));
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 24px;
  padding: 28px;
  animation: fadeIn .6s ease;
  display: none;
}
.summary-box.show { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.summary-num {
  font-family: 'Prompt', sans-serif;
  font-weight: 900;
  font-size: clamp(3rem, 10vw, 5rem);
  color: var(--gold);
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
}
.summary-label {
  color: rgba(255,255,255,0.6);
  font-size: .95rem;
  margin-top: 4px;
}
.summary-note {
  color: rgba(255,255,255,0.35);
  font-size: .78rem;
  margin-top: 12px;
  line-height: 1.6;
}

/* ── CONFETTI ── */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.cp {
  position: absolute;
  opacity: 0;
  animation: fall linear forwards;
}
@keyframes fall {
  0%   { transform: translateY(-30px) translateX(0) rotate(0deg); opacity: 1; }
  50%  { transform: translateY(50vh) translateX(20px) rotate(180deg); opacity: 0.9; }
  100% { transform: translateY(110vh) translateX(-20px) rotate(360deg); opacity: 0; }
}

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  width: 100%; max-width: 440px; margin: 0 auto 6px;
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  overflow: hidden;
  opacity: 0;
  transition: opacity .3s;
}
.progress-bar-wrap.show { opacity: 1; }
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--gold));
  border-radius: 4px;
  transition: width .5s ease;
  width: 0%;
}
.progress-label {
  font-size: .72rem;
  color: rgba(255,255,255,0.3);
  margin-bottom: 20px;
  min-height: 16px;
}
</style>
</head>

</div>

// ── Audio Context & Sound Synthesizer ──
let audioCtx = null;
let isMuted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇 เสียง: ปิด' : '🔊 เสียง: เปิด';
}

// 1. เสียงติ๊กเบา ๆ ตอนเริ่มสุ่มชื่อ (Spin Tick)
function playTickSound() {
  if (isMuted) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(550, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.04);
  
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.04);
}

// 2. เสียงตีกลองลุ้นระทึก (Drum Roll)
let drumInterval = null;
function startDrumRoll() {
  if (isMuted) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  drumInterval = setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(75 + Math.random() * 25, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.07);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.07);
  }, 45);
}

function stopDrumRoll() {
  if (drumInterval) {
    clearInterval(drumInterval);
    drumInterval = null;
  }
}

// 3. เสียงแตรฉลองอย่างยิ่งใหญ่ (Success Fanfare Chord)
function playFanfare() {
  if (isMuted) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const now = audioCtx.currentTime;
  // ไล่สเกลเมเจอร์คอร์ด (C-E-G-C) สร้างความรู้สึกน่ายินดี
  const chordNotes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
  
  chordNotes.forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now + idx * 0.07);
    
    gain.gain.setValueAtTime(0, now + idx * 0.07);
    gain.gain.linearRampToValueAtTime(0.12, now + idx * 0.07 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.07 + 0.5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(now + idx * 0.07);
    osc.stop(now + idx * 0.07 + 0.55);
  });
}


// ── State Management ──
const getBangkokDate = () => {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Bangkok',
    year: 'numeric',
    month: 'numeric',
    day: 'numeric'
  });
  const parts = formatter.formatToParts(now);
  const dateParts = {};
  parts.forEach(p => { dateParts[p.type] = p.value; });
  
  return {
    day: parseInt(dateParts.day, 10),
    month: parseInt(dateParts.month, 10),
    year: parseInt(dateParts.year, 10)
  };
};

const isLeapYear = (year) => {
  return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
};

// เริ่มต้นดึงวันปัจจุบัน
const bkkInfo = getBangkokDate();
let TODAY_M = bkkInfo.month;
let TODAY_D = bkkInfo.day;
let TODAY_Y = bkkInfo.year;

const getTodayBirthdays = () => {
  return ALL_DATA.filter(p => {
    if (p.month === TODAY_M && p.day === TODAY_D) {
      return true;
    }
    // หากปีนี้ไม่ใช่ปีอธิกสุรทิน และวันนี้เป็นวันที่ 28 ก.พ. ให้รวมคนเกิดวันที่ 29 ก.พ. เข้ามาด้วย
    if (!isLeapYear(TODAY_Y) && TODAY_M === 2 && TODAY_D === 28) {
      return p.month === 2 && p.day === 29;
    }
    return false;
  }).sort(() => Math.random() - 0.5); // Shuffle
};

let todayPeople = getTodayBirthdays();
let revealedCount = 0;
let isAnimating = false;
let done = false;

// ── Init ──
(function init() {
  const dateInput = document.getElementById('dateInput');
  // ตั้งค่าเริ่มต้นใน input date (YYYY-MM-DD)
  const yStr = TODAY_Y;
  const mStr = String(TODAY_M).padStart(2, '0');
  const dStr = String(TODAY_D).padStart(2, '0');
  dateInput.value = `${yStr}-${mStr}-${dStr}`;

  checkAndRenderState();
})();

// ตรวจเช็คเพื่อเตรียมหน้าจอเริ่มต้น
function checkAndRenderState() {
  if (todayPeople.length === 0) {
    showEmptyState();
  } else {
    showInitialState();
  }
}

function showEmptyState() {
  document.getElementById('spinBtn').style.display = 'none';
  document.getElementById('mystLabel').textContent = 'วันนี้เป็นวันสบาย ๆ';
  const card = document.getElementById('bigCard');
  card.className = 'big-card no-more';
  
  document.getElementById('cardInner').innerHTML = `
    <div class="reveal-emoji">🍃</div>
    <div class="no-more-text">วันนี้ไม่มีวันเกิดในระบบ</div>
    <div class="no-more-sub">ขอให้วันนี้เป็นวันที่ดีและมีความสุขสำหรับทุกคนนะจ้า 🎉</div>
  `;
}

function showInitialState() {
  document.getElementById('spinBtn').style.display = '';
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('bigCard').className = 'big-card idle';
  document.getElementById('cardInner').innerHTML = `
    <div class="qmark">🎁</div>
    <div class="qmark-sub">กดปุ่มด้านล่างเพื่อลุ้น</div>
  `;
  document.getElementById('mystLabel').textContent = 'กดเพื่อเปิดเผยคนแรก';
  updateBtn();
}

// ── ดักจับเหตุการณ์เมื่อเปลี่ยนปฏิทิน ──
function onDateChange(event) {
  const val = event.target.value;
  if (!val) return;
  
  const [yr, mo, dy] = val.split('-').map(Number);
  TODAY_Y = yr;
  TODAY_M = mo;
  TODAY_D = dy;

  todayPeople = getTodayBirthdays();
  resetAll();
}

function updateBtn() {
  const btn = document.getElementById('spinBtn');
  if (done || todayPeople.length === 0) return;
  if (revealedCount === 0) {
    btn.textContent = '🎁 เปิดเผยคนแรก!';
  } else {
    const remaining = todayPeople.length - revealedCount;
    btn.textContent = remaining > 0
      ? `🎰 เปิดคนต่อไป (เหลือ ${remaining} คน)`
      : '🎊 ดูสรุป!';
  }
}

async function reveal() {
  if (isAnimating || done || todayPeople.length === 0) return;

  if (revealedCount >= todayPeople.length) {
    showSummary();
    return;
  }

  isAnimating = true;
  document.getElementById('spinBtn').disabled = true;

  const person = todayPeople[revealedCount];
  const card = document.getElementById('bigCard');
  const inner = document.getElementById('cardInner');

  // ── Phase 1: Spinning (สุ่มแสดงชื่อที่รันความเร็วสูงพร้อมเสียง Blip) ──
  card.className = 'big-card spinning';
  document.getElementById('mystLabel').textContent = 'กำลังค้นหา...';

  const progWrap = document.getElementById('progWrap');
  const progFill = document.getElementById('progFill');
  const progLabel = document.getElementById('progLabel');
  progWrap.classList.add('show');

  const otherPeople = ALL_DATA.filter(p => !todayPeople.some(tp => tp.name === p.name));
  const dummyPool = otherPeople.length > 0 ? otherPeople : ALL_DATA;

  const interval = setInterval(() => {
    const rnd = dummyPool[Math.floor(Math.random() * dummyPool.length)];
    inner.innerHTML = `<div class="spin-text">${rnd.name}</div>`;
    playTickSound(); // เล่นเสียงประกอบทุกครั้งที่เปลี่ยนแผ่นป้ายชื่อสุ่ม
  }, 70);

  await sleep(1800);
  clearInterval(interval);

  // ── Phase 2: เริ่มเสียงกลองรัวระทึก (Drum Roll) ระหว่างเครื่องหมายสัญลักษณ์ ──
  inner.innerHTML = `<div class="spin-text" style="font-size:2rem">🥁🥁🥁</div>`;
  startDrumRoll();
  await sleep(800);
  stopDrumRoll();

  // ── Phase 3: เปิดเผยข้อมูลจริงและเล่นเสียงแตรฉลอง ──
  card.className = 'big-card revealed';
  const emoji = person.role === 'Teacher' ? '👩‍🏫' : '🎒';
  inner.innerHTML = `
    <div class="reveal-emoji">🎂</div>
    <div class="reveal-name">${person.name}</div>
    <div class="reveal-meta">
      <span class="badge ${person.role === 'Teacher' ? 'teacher' : 'student'}">${emoji} ${person.role === 'Teacher' ? 'ครู' : 'นักเรียน'}</span>
      <span class="badge room">${person.room}</span>
    </div>
  `;

  playFanfare(); // เล่นเสียงคอร์ดดนตรีสังเคราะห์
  launchConfetti(25);

  revealedCount++;
  const pct = (revealedCount / todayPeople.length) * 100;
  progFill.style.width = pct + '%';
  progLabel.textContent = `เปิดแล้ว ${revealedCount} / ${todayPeople.length} คน`;
  document.getElementById('mystLabel').textContent = `🎂 วันเกิดวันนี้ คนที่ ${revealedCount}!`;

  addToRevealedList(person, revealedCount);
  updateBtn();

  if (revealedCount >= todayPeople.length) {
    done = true;
    await sleep(800);
    document.getElementById('spinBtn').textContent = '🎊 ดูสรุปทั้งหมด!';
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('resetBtn').classList.add('show');
    isAnimating = false;
    return;
  }

  await sleep(300);
  isAnimating = false;
  document.getElementById('spinBtn').disabled = false;
}

function addToRevealedList(person, num) {
  const section = document.getElementById('revealedSection');
  const list = document.getElementById('revealedList');
  const title = document.getElementById('revealedTitle');

  section.style.display = 'block';
  title.textContent = `เปิดเผยแล้ว ${num} คน`;

  const emoji = person.role === 'Teacher' ? '👩‍🏫' : '🎒';
  const item = document.createElement('div');
  item.className = 'revealed-item';
  item.innerHTML = `
    <div class="item-num">${num}</div>
    <div class="item-info">
      <div class="item-name">${person.name}</div>
      <div class="item-meta">
        <span class="badge ${person.role === 'Teacher' ? 'teacher' : 'student'}">${emoji} ${person.role === 'Teacher' ? 'ครู' : 'นักเรียน'}</span>
        <span class="badge room">${person.room}</span>
      </div>
    </div>
    <div style="font-size:1.5rem">🎂</div>
  `;
  list.appendChild(item);

  setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function showSummary() {
  const box = document.getElementById('summaryBox');
  const num = document.getElementById('summaryNum');
  const note = document.getElementById('summaryNote');

  const teachers = todayPeople.filter(p => p.role === 'Teacher');
  const students = todayPeople.filter(p => p.role === 'Student');

  num.textContent = todayPeople.length;
  let notes = [];
  if (teachers.length) notes.push(`👩‍🏫 ครู ${teachers.length} คน`);
  if (students.length) notes.push(`🎒 นักเรียน ${students.length} คน`);
  note.textContent = notes.join('  ·  ') + '\nขอให้มีความสุขในวันเกิดทุกคนนะจ้า 🎉';

  box.classList.add('show');
  playFanfare();
  launchConfetti(65);

  document.getElementById('spinBtn').style.display = 'none';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetAll() {
  stopDrumRoll();
  revealedCount = 0; 
  isAnimating = false; 
  done = false;

  document.getElementById('progWrap').classList.remove('show');
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progLabel').textContent = '';
  document.getElementById('revealedSection').style.display = 'none';
  document.getElementById('revealedList').innerHTML = '';
  document.getElementById('revealedTitle').textContent = 'เปิดเผยแล้ว';
  document.getElementById('summaryBox').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');

  checkAndRenderState();
}

// ── Helpers ──
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function launchConfetti(n) {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#FFD700','#FF6B9D','#00E5FF','#7B2FBE','#FF9500','#00FF88','#fff'];
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    const sz = Math.random() * 10 + 5;
    const shapes = ['50%','0%'];
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${shapes[Math.floor(Math.random()*2)]};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.6}s;
    `;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}
